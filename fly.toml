app = "job-market-intelligence-system"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/job_market.db"
  OUTPUTS_DIR = "/data/outputs"
  CORS_ORIGINS = "https://mostafaabla.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "job_market_data"
  destination = "/data"
  initial_size = "1gb"
